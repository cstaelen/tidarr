name: Yarn-Audit
on:
  push:
    branches: [ main ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      # Single root yarn.lock covers all workspaces (api, app, e2e)
      - name: Run audit
        run: npx --yes audit-ci@^7 --moderate --package-manager yarn
