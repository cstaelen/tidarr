name: Sync docs to wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.wiki.git" wiki

      - name: Copy docs to wiki
        run: |
          cp docs/API_DOCUMENTATION.md           wiki/Tidarr-API-Documentation.md
          cp docs/CUSTOM_SCRIPT_DOCUMENTATION.md wiki/Custom-processing-script.md
          cp docs/LIDARR_INTEGRATION.md          wiki/Lidarr-Integration-Guide.md
          cp docs/NGINX_PROXY_MANAGER.md         wiki/Nginx-Proxy-Manager-Configuration-Guide.md

      - name: Commit and push
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "docs: sync from main"
            git push
          fi
